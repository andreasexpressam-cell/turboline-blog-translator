<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>TurboLine Blog Translator</h1>
    <p class="sub">Γρήγορη μετάφραση κειμένου και SRT</p>

    <div class="toolbar">
      <select id="src_lang">
        <option value="auto">Αυτόματο</option>
        <option value="en">Αγγλικά</option>
        <option value="fr">Γαλλικά</option>
        <option value="it">Ιταλικά</option>
        <option value="de">Γερμανικά</option>
        <option value="es">Ισπανικά</option>
        <option value="pt">Πορτογαλικά</option>
        <option value="ar">Αραβικά</option>
        <option value="nl">Ολλανδικά</option>
        <option value="ja">Ιαπωνικά</option>
        <option value="ru">Ρωσικά</option>
        <option value="tr">Τουρκικά</option>
        <option value="el">Ελληνικά</option>
      </select>

      <select id="tgt_lang">
        <option value="el" selected>Ελληνικά</option>
        <option value="en">Αγγλικά</option>
        <option value="fr">Γαλλικά</option>
        <option value="it">Ιταλικά</option>
        <option value="de">Γερμανικά</option>
        <option value="es">Ισπανικά</option>
        <option value="pt">Πορτογαλικά</option>
        <option value="ar">Αραβικά</option>
        <option value="nl">Ολλανδικά</option>
        <option value="ja">Ιαπωνικά</option>
        <option value="ru">Ρωσικά</option>
        <option value="tr">Τουρκικά</option>
      </select>

      <button id="translate_btn">Μετάφραση</button>
      <button id="clear_btn" class="secondary">Καθάρισμα</button>
    </div>

    <div class="panes">
      <div class="pane">
        <label for="input_text">Πρωτότυπο</label>
        <textarea id="input_text" placeholder="Κάνε επικόλληση κειμένου ή SRT εδώ..."></textarea>
      </div>
      <div class="pane">
        <label for="output_text">Αποτέλεσμα</label>
        <textarea id="output_text" readonly></textarea>
      </div>
    </div>

    <div class="actions">
      <button id="copy_btn" class="secondary">Αντιγραφή αποτελέσματος</button>
      <span id="status">Έτοιμο</span>
    </div>
  </div>

<script>
const inputText = document.getElementById("input_text");
const outputText = document.getElementById("output_text");
const statusEl = document.getElementById("status");
const translateBtn = document.getElementById("translate_btn");
const clearBtn = document.getElementById("clear_btn");
const copyBtn = document.getElementById("copy_btn");

const API_URL = "/api/translate";
const SRT_TIME_RE = /^\d{2}:\d{2}:\d{2},\d{3}\s*-->\s*\d{2}:\d{2}:\d{2},\d{3}$/;

// πιο συντηρητικό split στο frontend
const FRONTEND_SRT_BLOCKS_PER_CHUNK = 45;

function normalizeNewlines(text) {
  return text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
}

function looksLikeSrt(text) {
  return normalizeNewlines(text)
    .split("\n")
    .some(line => SRT_TIME_RE.test(line.trim()));
}

function splitSrtIntoBlocks(text) {
  const normalized = normalizeNewlines(text).trim();
  if (!normalized) return [];
  return normalized.split(/\n{2,}/);
}

function isValidSrtBlock(block) {
  const lines = block.split("\n");
  if (lines.length < 2) return false;
  const idx = (lines[0] || "").trim();
  const timing = (lines[1] || "").trim();
  return /^\d+$/.test(idx) && SRT_TIME_RE.test(timing);
}

function groupSrtBlocks(blocks, maxBlocksPerChunk = FRONTEND_SRT_BLOCKS_PER_CHUNK) {
  const groups = [];
  let current = [];

  for (const block of blocks) {
    current.push(block);
    if (current.length >= maxBlocksPerChunk) {
      groups.push(current);
      current = [];
    }
  }

  if (current.length) groups.push(current);
  return groups;
}

function reindexSrtChunk(blocks, startIndex = 1) {
  const out = [];
  let counter = startIndex;

  for (const block of blocks) {
    const lines = block.split("\n");
    if (lines.length >= 2 && isValidSrtBlock(block)) {
      lines[0] = String(counter++);
      out.push(lines.join("\n"));
    } else {
      out.push(block);
    }
  }

  return out;
}

function restoreGlobalSrtNumbering(fullText) {
  const blocks = splitSrtIntoBlocks(fullText);
  let counter = 1;
  const out = [];

  for (const block of blocks) {
    const lines = block.split("\n");
    if (lines.length >= 2 && isValidSrtBlock(block)) {
      lines[0] = String(counter++);
      out.push(lines.join("\n"));
    } else {
      out.push(block);
    }
  }

  return out.join("\n\n") + "\n";
}

async function callTranslateApi(text, srcLang, tgtLang) {
  const payload = {
    text: text,
    src_lang: srcLang,
    tgt_lang: tgtLang
  };

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok || !data.ok) {
    const msg = data.error || `HTTP ${res.status}`;
    throw new Error(msg);
  }

  return data.result || "";
}

async function translateNormalText(text, srcLang, tgtLang) {
  statusEl.textContent = "Μετάφραση...";
  return await callTranslateApi(text, srcLang, tgtLang);
}

async function translateLargeSrt(text, srcLang, tgtLang) {
  const blocks = splitSrtIntoBlocks(text);

  if (!blocks.length) {
    return "";
  }

  const grouped = groupSrtBlocks(blocks, FRONTEND_SRT_BLOCKS_PER_CHUNK);
  const translatedGroups = [];

  for (let i = 0; i < grouped.length; i++) {
    const group = grouped[i];
    const reindexed = reindexSrtChunk(group, 1).join("\n\n") + "\n";

    statusEl.textContent = `Μετάφραση μέρους ${i + 1} από ${grouped.length}...`;

    const translatedChunk = await callTranslateApi(reindexed, srcLang, tgtLang);
    translatedGroups.push(translatedChunk);

    // μικρό διάλειμμα ανάμεσα στα requests
    await new Promise(resolve => setTimeout(resolve, 180));
  }

  const merged = translatedGroups
    .map(part => normalizeNewlines(part).trim())
    .filter(Boolean)
    .join("\n\n");

  return restoreGlobalSrtNumbering(merged);
}

async function handleTranslate() {
  const text = inputText.value.trim();
  const srcLang = document.getElementById("src_lang").value;
  const tgtLang = document.getElementById("tgt_lang").value;

  if (!text) {
    statusEl.textContent = "Βάλε κείμενο πρώτα.";
    outputText.value = "";
    return;
  }

  translateBtn.disabled = true;
  clearBtn.disabled = true;
  copyBtn.disabled = true;
  outputText.value = "";

  try {
    let result = "";

    if (looksLikeSrt(text)) {
      result = await translateLargeSrt(text, srcLang, tgtLang);
    } else {
      result = await translateNormalText(text, srcLang, tgtLang);
    }

    outputText.value = result;
    statusEl.textContent = "Έτοιμο";
  } catch (err) {
    console.error(err);
    statusEl.textContent = `Σφάλμα: ${err.message || "Κάτι πήγε στραβά."}`;
    outputText.value = "";
  } finally {
    translateBtn.disabled = false;
    clearBtn.disabled = false;
    copyBtn.disabled = false;
  }
}

translateBtn.addEventListener("click", handleTranslate);

clearBtn.addEventListener("click", () => {
  inputText.value = "";
  outputText.value = "";
  statusEl.textContent = "Έτοιμο";
});

copyBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(outputText.value);
    statusEl.textContent = "Αντιγράφηκε";
  } catch {
    statusEl.textContent = "Δεν έγινε αντιγραφή";
  }
});
</script>
</body>
</html>
